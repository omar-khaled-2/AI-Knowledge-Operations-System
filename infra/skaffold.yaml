apiVersion: skaffold/v4beta11
kind: Config

build:
  artifacts:
    - image: frontend
      context: ../frontend
      docker:
        dockerfile: Dockerfile
        buildArgs:
          # Internal backend service URL for Next.js server-side proxy
          # In K8s, this is the backend service DNS name
          API_URL: "http://backend-backend"
    - image: backend
      context: ../backend
      docker:
        dockerfile: Dockerfile
    - image: document-processor
      context: ../services/document-processor
      docker:
        dockerfile: Dockerfile
  tagPolicy:
    gitCommit: {}
  local:
    push: false

deploy:
  helm:
    releases:
      - name: mongodb
        chartPath: helm/mongodb
        namespace: default
        createNamespace: true
        valuesFiles:
          - values.yaml
        skipBuildDependencies: false
      - name: redis
        chartPath: helm/redis
        namespace: default
        createNamespace: true
        valuesFiles:
          - values.yaml
        skipBuildDependencies: false
      - name: frontend
        chartPath: helm/frontend
        namespace: default
        createNamespace: true
        valuesFiles:
          - values.yaml
        setValues:
          image.repository: frontend
          image.tag: latest
      - name: backend
        chartPath: helm/backend
        namespace: default
        createNamespace: true
        valuesFiles:
          - values.yaml
        setValues:
          image.repository: backend
          image.tag: latest
      - name: document-processor
        chartPath: helm/document-processor
        namespace: default
        createNamespace: true
        valuesFiles:
          - values.yaml
        setValues:
          image.repository: document-processor
          image.tag: latest

portForward:
  - resourceType: service
    resourceName: frontend-frontend
    port: 80
    localPort: 3000
  - resourceType: service
    resourceName: backend-backend
    port: 80
    localPort: 3001
  - resourceType: service
    resourceName: redis-master
    port: 6379
    localPort: 6379
