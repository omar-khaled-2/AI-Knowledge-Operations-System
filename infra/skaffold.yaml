apiVersion: skaffold/v4beta11
kind: Config

build:
  artifacts:
    - image: frontend
      context: ../frontend
      docker:
        dockerfile: Dockerfile
        buildArgs:
          # Internal backend service URL for Next.js server-side proxy
          # In K8s, this is the backend service DNS name
          API_URL: "http://backend-backend"
          # WebSocket gateway URL for real-time updates (client-side)
          # Must use NEXT_PUBLIC_ prefix to be available in browser
          NEXT_PUBLIC_WS_URL: "ws://localhost:3002"
    - image: backend
      context: ../backend
      docker:
        dockerfile: Dockerfile
    - image: document-processor
      context: ../services/document-processor
      docker:
        dockerfile: Dockerfile
    - image: embedding-service
      context: ../services/embedding-service
      docker:
        dockerfile: Dockerfile
    - image: retrieval-service
      context: ../services/retrieval-service
      docker:
        dockerfile: Dockerfile
    - image: websocket-gateway
      context: ../services/websocket-gateway
      docker:
        dockerfile: Dockerfile
    - image: chat-service
      context: ../services/chat-service
      docker:
        dockerfile: Dockerfile
  tagPolicy:
    gitCommit: {}
  local:
    push: false

deploy:
  helm:
    releases:
      - name: mongodb
        chartPath: helm/mongodb
        namespace: default
        createNamespace: true
        valuesFiles:
          - values.yaml
        skipBuildDependencies: false
      - name: redis
        chartPath: helm/redis
        namespace: default
        createNamespace: true
        valuesFiles:
          - values.yaml
        skipBuildDependencies: false
      - name: rabbitmq
        chartPath: helm/rabbitmq
        namespace: default
        createNamespace: true
        valuesFiles:
          - values.yaml
        skipBuildDependencies: false
      - name: qdrant
        chartPath: helm/qdrant
        namespace: default
        createNamespace: true
        valuesFiles:
          - values.yaml
        skipBuildDependencies: false
      - name: frontend
        chartPath: helm/frontend
        namespace: default
        createNamespace: true
        valuesFiles:
          - values.yaml
        setValues:
          image.repository: frontend
          image.tag: latest
      - name: backend
        chartPath: helm/backend
        namespace: default
        createNamespace: true
        valuesFiles:
          - values.yaml
        setValues:
          image.repository: backend
          image.tag: latest
      - name: document-processor
        chartPath: helm/document-processor
        namespace: default
        createNamespace: true
        valuesFiles:
          - values.yaml
        setValues:
          image.repository: document-processor
          image.tag: latest
      - name: embedding-service
        chartPath: helm/embedding-service
        namespace: default
        createNamespace: true
        valuesFiles:
          - values.yaml
        setValues:
          image.repository: embedding-service
          image.tag: latest
      - name: retrieval-service
        chartPath: helm/retrieval-service
        namespace: default
        createNamespace: true
        valuesFiles:
          - values.yaml
        setValues:
          image.repository: retrieval-service
          image.tag: latest
      - name: websocket-gateway
        chartPath: helm/websocket-gateway
        namespace: default
        createNamespace: true
        valuesFiles:
          - values.yaml
        setValues:
          image.repository: websocket-gateway
          image.tag: latest
          config.frontendUrl: "http://localhost:3000"
      - name: chat-service
        chartPath: helm/chat-service
        namespace: default
        createNamespace: true
        valuesFiles:
          - values.yaml
        setValues:
          image.repository: chat-service
          image.tag: latest
      - name: grafana
        chartPath: helm/grafana
        namespace: default
        createNamespace: true
        valuesFiles:
          - values.yaml
        skipBuildDependencies: false
      - name: alloy
        chartPath: helm/alloy
        namespace: default
        createNamespace: true
        valuesFiles:
          - values.yaml
        skipBuildDependencies: false
      - name: loki
        chartPath: helm/loki
        namespace: default
        createNamespace: true
        valuesFiles:
          - values.yaml
        skipBuildDependencies: false

portForward:
  - resourceType: service
    resourceName: grafana
    port: 3000
    localPort: 9000
  - resourceType: service
    resourceName: frontend-frontend
    port: 80
    localPort: 3000
  - resourceType: service
    resourceName: backend-backend
    port: 80
    localPort: 3001
  - resourceType: service
    resourceName: redis-master
    port: 6379
    localPort: 6379
  - resourceType: service
    resourceName: rabbitmq
    port: 15672
    localPort: 15672
  - resourceType: service
    resourceName: qdrant
    port: 6333
    localPort: 6333
  - resourceType: service
    resourceName: websocket-gateway-websocket-gateway
    port: 80
    localPort: 3002
