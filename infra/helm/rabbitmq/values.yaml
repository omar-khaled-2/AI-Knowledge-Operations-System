# Default values for rabbitmq
# This is a YAML-formatted file.

image:
  repository: rabbitmq
  tag: "3.13-management-alpine"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  amqpPort: 5672
  managementPort: 15672

replicaCount: 1

# Resource limits for RabbitMQ
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# No persistence for MVP (ephemeral)
persistence:
  enabled: false

nodeSelector: {}

tolerations: []

affinity: {}
