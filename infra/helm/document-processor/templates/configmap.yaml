apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "document-processor.fullname" . }}-config
  labels:
    {{- include "document-processor.labels" . | nindent 4 }}
data:
  NODE_ENV: {{ .Values.config.nodeEnv | default "production" | quote }}
  PORT: {{ .Values.service.targetPort | quote }}
  QUEUE_NAME: {{ .Values.config.queueName | default "document-processing" | quote }}
  CONCURRENCY: {{ .Values.config.concurrency | default "5" | quote }}
  CHUNK_SIZE: {{ .Values.config.chunkSize | default "1024" | quote }}
  MAX_DOCUMENT_SIZE: {{ .Values.config.maxDocumentSize | default "50" | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | default "info" | quote }}
  REDIS_HOST: {{ .Values.redis.host | default "redis-master" | quote }}
  REDIS_PORT: {{ .Values.redis.port | default "6379" | quote }}
  RABBITMQ_URL: "amqp://{{ .Values.rabbitmq.host }}:{{ .Values.rabbitmq.port }}"
  RABBITMQ_EXCHANGE: {{ .Values.rabbitmq.exchange | quote }}
  RABBITMQ_DOCUMENT_QUEUE: {{ .Values.rabbitmq.queue | quote }}
  RABBITMQ_EMBEDDING_ROUTING_KEY: {{ .Values.rabbitmq.embeddingRoutingKey | quote }}
  AWS_REGION: {{ .Values.aws.region | default "eu-west-3" | quote }}
  S3_BUCKET_NAME: {{ .Values.s3.bucketName | quote }}
  QDRANT_URL: "http://{{ .Values.qdrant.host }}:{{ .Values.qdrant.port }}"
  QDRANT_COLLECTION: {{ .Values.qdrant.collection | quote }}
  EMBEDDING_MODEL: {{ .Values.embedding.modelName | quote }}
  EMBEDDING_QUEUE_NAME: {{ .Values.embedding.queueName | quote }}
  MAX_CHUNK_SIZE: {{ .Values.embedding.maxChunkSize | quote }}
