apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "document-processor.fullname" . }}
  labels:
    {{- include "document-processor.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "document-processor.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "document-processor.selectorLabels" . | nindent 8 }}
    spec:
      {{- if or .Values.initContainers.redisWait.enabled .Values.initContainers.rabbitmqWait.enabled }}
      initContainers:
        {{- if .Values.initContainers.redisWait.enabled }}
        - name: wait-for-redis
          image: "{{ .Values.initContainers.redisWait.image.repository }}:{{ .Values.initContainers.redisWait.image.tag }}"
          imagePullPolicy: {{ .Values.initContainers.redisWait.image.pullPolicy }}
          resources:
            {{- toYaml .Values.initContainers.redisWait.resources | nindent 12 }}
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Values.redis.host }} {{ .Values.redis.port }}; do
                echo "Waiting for Redis..."
                sleep {{ .Values.initContainers.redisWait.interval }}
              done
              echo "Redis is available!"
        {{- end }}
        {{- if .Values.initContainers.rabbitmqWait.enabled }}
        - name: wait-for-rabbitmq
          image: "{{ .Values.initContainers.rabbitmqWait.image.repository }}:{{ .Values.initContainers.rabbitmqWait.image.tag }}"
          imagePullPolicy: {{ .Values.initContainers.rabbitmqWait.image.pullPolicy }}
          resources:
            {{- toYaml .Values.initContainers.rabbitmqWait.resources | nindent 12 }}
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Values.rabbitmq.host }} {{ .Values.rabbitmq.port }}; do
                echo "Waiting for RabbitMQ..."
                sleep {{ .Values.initContainers.rabbitmqWait.interval }}
              done
              echo "RabbitMQ is available!"
        {{- end }}
      {{- end }}
      containers:
        - name: document-processor
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "document-processor.fullname" . }}-config
          env:
            - name: REDIS_URL
              value: "redis://{{ .Values.redis.host }}:{{ .Values.redis.port }}"
            - name: RABBITMQ_URL
              value: "amqp://{{ .Values.rabbitmq.host }}:{{ .Values.rabbitmq.port }}"
            - name: RABBITMQ_EXCHANGE
              value: {{ .Values.rabbitmq.exchange | quote }}
            - name: RABBITMQ_DOCUMENT_QUEUE
              value: {{ .Values.rabbitmq.queue | quote }}
            - name: RABBITMQ_EMBEDDING_ROUTING_KEY
              value: {{ .Values.rabbitmq.embeddingRoutingKey | quote }}
            - name: AWS_REGION
              value: {{ .Values.aws.region | quote }}
            - name: S3_BUCKET_NAME
              value: {{ .Values.s3.bucketName | quote }}
            - name: QDRANT_URL
              value: "http://{{ .Values.qdrant.host }}:{{ .Values.qdrant.port }}"
            - name: QDRANT_COLLECTION
              value: {{ .Values.qdrant.collection | quote }}
            - name: EMBEDDING_MODEL
              value: {{ .Values.embedding.modelName | quote }}
            - name: EMBEDDING_QUEUE_NAME
              value: {{ .Values.embedding.queueName | quote }}
            - name: MAX_CHUNK_SIZE
              value: {{ .Values.embedding.maxChunkSize | quote }}
            {{- if .Values.llm.existingSecretName }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.llm.existingSecretName }}
                  key: OPENAI_API_KEY
            {{- end }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.aws.secretName }}
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.aws.secretName }}
                  key: AWS_SECRET_ACCESS_KEY
          livenessProbe:
            httpGet:
              path: {{ .Values.healthCheck.livenessPath }}
              port: http
            initialDelaySeconds: {{ .Values.healthCheck.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.healthCheck.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.healthCheck.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.healthCheck.readinessPath }}
              port: http
            initialDelaySeconds: {{ .Values.healthCheck.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.healthCheck.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.healthCheck.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
