apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-backend
  labels:
    app: backend
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: backend
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: backend
        release: {{ .Release.Name }}
    spec:
      {{- if or .Values.initContainers.mongodbWait.enabled .Values.initContainers.redisWait.enabled .Values.initContainers.rabbitmqWait.enabled }}
      initContainers:
        {{- if .Values.initContainers.mongodbWait.enabled }}
        - name: wait-for-mongodb
          image: "{{ .Values.initContainers.mongodbWait.image.repository }}:{{ .Values.initContainers.mongodbWait.image.tag }}"
          imagePullPolicy: {{ .Values.initContainers.mongodbWait.image.pullPolicy | default .Values.imagePullPolicy }}
          command:
            - sh
            - -c
            - |
              echo "Waiting for MongoDB at ${MONGODB_HOST}:${MONGODB_PORT}..."
              timeout {{ .Values.initContainers.mongodbWait.timeout }} sh -c '
                until wget -qO- "http://${MONGODB_HOST}:${MONGODB_PORT}" >/dev/null 2>&1 || nc -z "${MONGODB_HOST}" "${MONGODB_PORT}" 2>/dev/null; do
                  echo "MongoDB not ready, waiting {{ .Values.initContainers.mongodbWait.interval }}s..."
                  sleep {{ .Values.initContainers.mongodbWait.interval }}
                done
              ' && echo "MongoDB is ready!" || { echo "ERROR: Timeout waiting for MongoDB after {{ .Values.initContainers.mongodbWait.timeout }} seconds"; exit 1; }
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-backend-config
          resources:
            {{- toYaml .Values.initContainers.mongodbWait.resources | nindent 12 }}
        {{- end }}
        {{- if .Values.initContainers.redisWait.enabled }}
        - name: wait-for-redis
          image: "{{ .Values.initContainers.redisWait.image.repository }}:{{ .Values.initContainers.redisWait.image.tag }}"
          imagePullPolicy: {{ .Values.initContainers.redisWait.image.pullPolicy | default .Values.imagePullPolicy }}
          command:
            - sh
            - -c
            - |
              echo "Waiting for Redis at ${REDIS_HOST}:${REDIS_PORT}..."
              timeout {{ .Values.initContainers.redisWait.timeout }} sh -c '
                until nc -z "${REDIS_HOST}" "${REDIS_PORT}" 2>/dev/null; do
                  echo "Redis not ready, waiting {{ .Values.initContainers.redisWait.interval }}s..."
                  sleep {{ .Values.initContainers.redisWait.interval }}
                done
              ' && echo "Redis is ready!" || { echo "ERROR: Timeout waiting for Redis after {{ .Values.initContainers.redisWait.timeout }} seconds"; exit 1; }
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-backend-config
          resources:
            {{- toYaml .Values.initContainers.redisWait.resources | nindent 12 }}
        {{- end }}
        {{- if .Values.initContainers.rabbitmqWait.enabled }}
        - name: wait-for-rabbitmq
          image: "{{ .Values.initContainers.rabbitmqWait.image.repository }}:{{ .Values.initContainers.rabbitmqWait.image.tag }}"
          imagePullPolicy: {{ .Values.initContainers.rabbitmqWait.image.pullPolicy | default .Values.imagePullPolicy }}
          command:
            - sh
            - -c
            - |
              echo "Waiting for RabbitMQ at ${RABBITMQ_HOST}:${RABBITMQ_PORT}..."
              timeout {{ .Values.initContainers.rabbitmqWait.timeout }} sh -c '
                until nc -z "${RABBITMQ_HOST}" "${RABBITMQ_PORT}" 2>/dev/null; do
                  echo "RabbitMQ not ready, waiting {{ .Values.initContainers.rabbitmqWait.interval }}s..."
                  sleep {{ .Values.initContainers.rabbitmqWait.interval }}
                done
              ' && echo "RabbitMQ is ready!" || { echo "ERROR: Timeout waiting for RabbitMQ after {{ .Values.initContainers.rabbitmqWait.timeout }} seconds"; exit 1; }
          env:
            - name: RABBITMQ_HOST
              value: {{ .Values.rabbitmq.host | quote }}
            - name: RABBITMQ_PORT
              value: {{ .Values.rabbitmq.port | quote }}
          resources:
            {{- toYaml .Values.initContainers.rabbitmqWait.resources | nindent 12 }}
        {{- end }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
              name: http
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-backend-config
            - secretRef:
                name: {{ .Values.secrets.existingSecretName }}
          # MongoDB credentials from separate secret (single source of truth)
          env:
            - name: MONGODB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mongodb.existingSecretName | default "mongodb-secrets" }}
                  key: mongodb-root-user
            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mongodb.existingSecretName | default "mongodb-secrets" }}
                  key: mongodb-root-password
            # AWS credentials for S3 document uploads (separate secret for better isolation)
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.existingSecretName | default "aws-secrets" }}
                  key: AWS_ACCESS_KEY_ID
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.existingSecretName | default "aws-secrets" }}
                  key: AWS_SECRET_ACCESS_KEY
                  optional: true
            {{- if .Values.llm.existingSecretName }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.llm.existingSecretName }}
                  key: OPENAI_API_KEY
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
