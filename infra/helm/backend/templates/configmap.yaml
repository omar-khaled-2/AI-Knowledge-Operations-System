apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-backend-config
  labels:
    app: backend
    release: {{ .Release.Name }}
data:
  BETTER_AUTH_URL: {{ .Values.config.betterAuthUrl | default (printf "http://%s-backend.%s.svc.cluster.local" .Release.Name .Release.Namespace) | quote }}
  FRONTEND_URL: {{ .Values.config.frontendUrl | default (printf "http://%s-frontend.%s.svc.cluster.local" .Release.Name .Release.Namespace) | quote }}
  GOOGLE_REDIRECT_URI: {{ .Values.config.googleRedirectUri | default (printf "http://%s-backend.%s.svc.cluster.local/api/auth/callback/google" .Release.Name .Release.Namespace) | quote }}
  NODE_ENV: "production"
  PORT: "3000"
  # MongoDB connection (non-sensitive parts)
  MONGODB_HOST: {{ .Values.mongodb.host | default "mongodb" | quote }}
  MONGODB_PORT: {{ .Values.mongodb.port | default "27017" | quote }}
  MONGODB_DATABASE: {{ .Values.mongodb.database | default "ai-knowledge" | quote }}
  # Redis connection (non-sensitive parts)
  REDIS_HOST: {{ .Values.redis.host | default "redis" | quote }}
  REDIS_PORT: {{ .Values.redis.port | default "6379" | quote }}
  # RabbitMQ connection (non-sensitive parts)
  RABBITMQ_URL: "amqp://{{ .Values.rabbitmq.host }}:{{ .Values.rabbitmq.port }}"
  RABBITMQ_EXCHANGE: {{ .Values.rabbitmq.exchange | quote }}
  RABBITMQ_DOCUMENT_QUEUE: {{ .Values.rabbitmq.documentQueue | quote }}
  RABBITMQ_EMBEDDING_QUEUE: {{ .Values.rabbitmq.embeddingQueue | quote }}
  # S3 configuration (non-sensitive parts)
  S3_REGION: {{ .Values.s3.region | default "us-east-1" | quote }}
  S3_BUCKET: {{ .Values.s3.bucket | quote }}
  S3_ENDPOINT: {{ .Values.s3.endpoint | default "" | quote }}
