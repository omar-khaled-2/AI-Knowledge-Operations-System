replicaCount: 1

image:
  repository: insight-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

rabbitmq:
  host: "rabbitmq"
  port: 5672
  exchange: "documents"
  queue: "insight-jobs"
  routingKey: "document.embedded"

qdrant:
  host: "qdrant"
  port: 6333
  collection: "documents"

backend:
  url: "http://backend-backend:80"

config:
  logLevel: "info"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi
