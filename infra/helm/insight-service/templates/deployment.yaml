apiVersion: apps/v1
kind: Deployment
metadata:
  name: insight-service
  labels:
    app.kubernetes.io/name: insight-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: insight-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: insight-service
    spec:
      containers:
        - name: insight-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: RABBITMQ_URL
              value: "amqp://{{ .Values.rabbitmq.host }}:{{ .Values.rabbitmq.port }}"
            - name: RABBITMQ_EXCHANGE
              value: {{ .Values.rabbitmq.exchange | quote }}
            - name: RABBITMQ_QUEUE
              value: {{ .Values.rabbitmq.queue | quote }}
            - name: RABBITMQ_ROUTING_KEY
              value: {{ .Values.rabbitmq.routingKey | quote }}
            - name: QDRANT_URL
              value: "http://{{ .Values.qdrant.host }}:{{ .Values.qdrant.port }}"
            - name: QDRANT_COLLECTION
              value: {{ .Values.qdrant.collection | quote }}
            - name: BACKEND_URL
              value: {{ .Values.backend.url | quote }}
            - name: RETRIEVAL_SERVICE_URL
              value: {{ .Values.retrieval.url | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-secrets
                  key: OPENAI_API_KEY
            - name: OPENAI_MODEL
              value: "gpt-5.4-nano"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
