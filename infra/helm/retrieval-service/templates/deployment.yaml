apiVersion: apps/v1
kind: Deployment
metadata:
  name: retrieval-service
  labels:
    app.kubernetes.io/name: retrieval-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: retrieval-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: retrieval-service
    spec:
      initContainers:
        - name: wait-for-qdrant
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Qdrant at {{ .Values.qdrant.host }}:{{ .Values.qdrant.port }}..."
              until wget -qO- http://{{ .Values.qdrant.host }}:{{ .Values.qdrant.port }}/healthz; do
                echo "Qdrant not ready, waiting..."
                sleep 2
              done
              echo "Qdrant is ready!"
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: retrieval-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: retrieval-service-config
          env:
            - name: QDRANT_URL
              value: "http://{{ .Values.qdrant.host }}:{{ .Values.qdrant.port }}"
            - name: QDRANT_COLLECTION
              value: {{ .Values.qdrant.collection | quote }}
            - name: EMBEDDING_MODEL
              value: {{ .Values.config.embeddingModel | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            - name: PORT
              value: {{ .Values.service.targetPort | quote }}
            - name: REQUEST_TIMEOUT
              value: {{ .Values.requestTimeout | quote }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.llm.existingSecretName }}
                  key: OPENAI_API_KEY
          livenessProbe:
            httpGet:
              path: {{ .Values.healthCheck.livenessPath }}
              port: http
            initialDelaySeconds: {{ .Values.healthCheck.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.healthCheck.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.healthCheck.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.healthCheck.readinessPath }}
              port: http
            initialDelaySeconds: {{ .Values.healthCheck.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.healthCheck.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.healthCheck.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
