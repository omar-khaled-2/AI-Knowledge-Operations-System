apiVersion: v1
kind: Service
metadata:
  name: chat-service
  labels:
    app.kubernetes.io/name: chat-service
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: chat-service
